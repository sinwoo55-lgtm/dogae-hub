<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>업무분장 · 도개중고등학교</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #253E8A;
      --navy-dark: #182B6A;
      --navy-pale: #EEF2FB;
      --accent:    #C9A84C;
      --bg:        #F4F6FB;
      --surface:   #FFFFFF;
      --text:      #1A1E2E;
      --muted:     #64748B;
      --border:    #E2E8F4;
      --tr:        0.22s cubic-bezier(.4,0,.2,1);
      --radius:    14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 13px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12.5px; font-weight: 500; color: var(--navy);
      text-decoration: none; transition: var(--tr);
    }
    .back-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
    .header-divider { width: 1px; height: 20px; background: var(--border); }
    .header-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px; font-weight: 700; color: var(--navy);
    }
    .header-sub { font-size: 12px; color: var(--muted); font-weight: 400; }
    .dept-total {
      font-size: 12px; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 100px;
    }

    /* ─── SEARCH ─── */
    .search-bar {
      flex-shrink: 0;
      padding: 12px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .search-icon { color: var(--muted); flex-shrink: 0; }
    .search-bar input {
      flex: 1; border: none; outline: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13.5px; color: var(--text); background: transparent;
    }
    .search-bar input::placeholder { color: #B0BAC8; }
    .search-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .search-clear {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--border); border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; line-height: 1; transition: var(--tr);
    }
    .search-clear.show { display: flex; }
    .search-clear:hover { background: var(--navy); color: #fff; }

    /* ─── MAIN 2-PANEL ─── */
    .main-wrap {
      flex: 1; overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
    }

    /* ═══ LEFT: 카드 그리드 ═══ */
    .grid-panel {
      overflow-y: auto;
      padding: 32px 36px;
      background: var(--bg);
    }
    .grid-panel::-webkit-scrollbar { width: 5px; }
    .grid-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .dept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    /* ─── 부서 카드 ─── */
    .dept-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 22px 22px;
      cursor: pointer;
      transition: var(--tr);
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column; gap: 14px;
      animation: cardIn .35s ease both;
    }
    .dept-card:nth-child(1)  { animation-delay:.03s }
    .dept-card:nth-child(2)  { animation-delay:.06s }
    .dept-card:nth-child(3)  { animation-delay:.09s }
    .dept-card:nth-child(4)  { animation-delay:.12s }
    .dept-card:nth-child(5)  { animation-delay:.15s }
    .dept-card:nth-child(6)  { animation-delay:.18s }
    .dept-card:nth-child(7)  { animation-delay:.21s }
    .dept-card:nth-child(8)  { animation-delay:.24s }
    .dept-card:nth-child(9)  { animation-delay:.27s }
    .dept-card:nth-child(10) { animation-delay:.30s }
    .dept-card:nth-child(11) { animation-delay:.33s }
    .dept-card:nth-child(12) { animation-delay:.36s }
    .dept-card:nth-child(13) { animation-delay:.39s }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:none; }
    }

    /* 좌측 컬러 바 */
    .dept-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--c);
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .dept-card:hover {
      border-color: var(--c);
      box-shadow: 0 6px 24px rgba(0,0,0,.09);
      transform: translateY(-2px);
    }
    .dept-card.active {
      border-color: var(--c);
      background: var(--navy-pale);
      box-shadow: 0 6px 24px rgba(37,62,138,.12);
    }

    /* 검색 매칭 */
    .dept-card.search-dim { opacity: .28; pointer-events: none; transform: none !important; box-shadow: none !important; }
    .dept-card.search-match { border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(201,168,76,.18) !important; }

    /* 카드 아이콘 */
    .card-icon {
      width: 54px; height: 54px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: var(--tr);
    }
    .card-icon svg { width: 26px; height: 26px; }
    .dept-card:hover .card-icon,
    .dept-card.active .card-icon {
      background: var(--c) !important;
    }
    .dept-card:hover .card-icon svg,
    .dept-card.active .card-icon svg { color: #fff !important; }

    .card-body {}
    .card-name {
      font-size: 13.5px; font-weight: 700;
      color: var(--text); margin-bottom: 4px; line-height: 1.3;
    }
    .card-head { font-size: 12px; color: var(--muted); }
    .card-count {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 700;
      color: var(--c);
      background: var(--surface);
      border: 1.5px solid var(--c);
      border-radius: 100px;
      padding: 1px 7px;
      opacity: .7;
    }

    /* ═══ RIGHT: 상세 패널 ═══ */
    .detail-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    /* 패널 닫기 버튼 */
    .panel-close-btn {
      position: absolute; top: 18px; right: 18px;
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--bg); border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: var(--tr); flex-shrink: 0;
    }
    .panel-close-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
    .panel-head { position: relative; }

    .panel-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 40px; text-align: center;
    }
    .panel-empty-icon {
      width: 54px; height: 54px; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .panel-empty-icon svg { width: 22px; height: 22px; color: #C5CDE0; }
    .panel-empty h3 { font-family:'Noto Serif KR',serif; font-size: 15px; color: var(--navy); }
    .panel-empty p  { font-size: 12.5px; color: var(--muted); line-height: 1.7; }

    #panelContent { display: none; flex-direction: column; height: 100%; overflow: hidden; }

    .panel-head {
      padding: 22px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .panel-head-icon {
      width: 48px; height: 48px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .panel-head-icon svg { width: 24px; height: 24px; }
    .panel-head-text {}
    .panel-dept-no { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .panel-dept-name { font-family:'Noto Serif KR',serif; font-size: 19px; font-weight: 700; color: var(--navy-dark); margin-bottom: 8px; }
    .panel-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .head-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 4px 11px; font-size: 12px;
    }
    .head-chip .role { color: var(--muted); }
    .head-chip .name { font-weight: 700; color: var(--navy); }
    .count-chip {
      font-size: 11px; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 100px; padding: 3px 10px;
    }

    .panel-body { flex: 1; overflow-y: auto; padding: 16px 24px 24px; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .member-card {
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 10px; transition: var(--tr);
    }
    .member-card:hover { border-color: var(--pc); box-shadow: 0 3px 14px rgba(0,0,0,.07); }
    .member-card-head {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }
    .member-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .member-avatar svg { width: 18px; height: 18px; }
    .member-role { font-size: 10px; font-weight: 700; letter-spacing: .5px; margin-bottom: 2px; }
    .member-name { font-size: 13px; font-weight: 700; color: var(--navy-dark); }
    .duty-list { padding: 10px 14px; list-style: none; }
    .duty-list li {
      font-size: 12.5px; color: var(--muted); line-height: 1.8; font-weight: 300;
      padding-left: 12px; position: relative;
    }
    .duty-list li::before { content:'–'; position:absolute; left:0; color:#C5CDE0; }
    mark { background:#FFF3CD; color:var(--text); border-radius:2px; padding:0 1px; }
    .no-result { text-align:center; color:var(--muted); font-size:13px; padding:36px 0; }

    @media (max-width: 900px) {
      .main-wrap.panel-open { grid-template-columns: 1fr; grid-template-rows: 1fr 50vh; }
      .detail-panel { border-left: none; border-top: 1px solid var(--border); }
    }
    @media (max-width: 640px) {
      header, .search-bar { padding: 0 16px; }
      .grid-panel { padding: 20px 16px; }
      .dept-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <a class="back-btn" href="index.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      허브로
    </a>
    <div class="header-divider"></div>

      <div class="header-title" id="headerTitle"></div>

    </div>
  </div>

</header>

<!-- 검색 -->
<div class="search-bar">

</div>

<div class="main-wrap">

            <span class="count-chip" id="pdCount"></span>
          </div>
        </div>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </div>
  </div>
</div>

var PALETTE = ['#253E8A','#1E7C5A','#7A3A7A','#B5500A','#2B8AB5','#C9284D','#3A6B3A','#6B3FA0','#1A6B6B','#8B3A3A','#5A6B00','#2A5A8A','#7A5C00'];
var depts = ORG_DATA.departments.map(function(d,i){ return Object.assign({},d,{color:PALETTE[i%PALETTE.length],idx:i}); });

var activeIdx   = null;
var searchQuery = '';

/* ── 헤더 세팅 ── */
document.getElementById('headerTitle').textContent  = ORG_DATA.year + ' 업무분장';
document.getElementById('deptTotal').textContent    = '총 ' + depts.length + '개 부서';

/* ── 그리드 구성 ── */
function buildGrid(){
  var grid = document.getElementById('deptGrid');
  grid.innerHTML = '';
  depts.forEach(function(d){
    var card = document.createElement('div');
    card.className = 'dept-card';
    card.dataset.idx = d.idx;
    card.style.setProperty('--c', d.color);

    var iconSvg = ICONS[d.icon] || ICONS.default;
    card.innerHTML =
      '<div class="card-count">'+d.members.length+'명</div>'+
      '<div class="card-icon" style="background:'+d.color+'1A;color:'+d.color+'">'+iconSvg+'</div>'+
      '<div class="card-body">'+
        '<div class="card-name">'+escHtml(d.name)+'</div>'+
        '<div class="card-head">'+escHtml(d.head)+' 부장</div>'+
      '</div>';

    card.addEventListener('click', function(){ selectDept(d.idx); });
    grid.appendChild(card);
  });
}

/* ── 부서 선택 (팝업) ── */
function selectDept(idx){
  activeIdx = idx;
  var d = depts[idx];

  // 카드 active 표시
  document.querySelectorAll('.dept-card').forEach(function(c){
    c.classList.toggle('active', parseInt(c.dataset.idx) === idx);
  });

  // 팝업 채우기
  var iconSvg = ICONS[d.icon] || ICONS.default;
  var dpIcon = document.getElementById('dpIcon');
  dpIcon.innerHTML = iconSvg;
  dpIcon.style.background = d.color + '18';
  dpIcon.style.color = d.color;
  dpIcon.querySelector('svg').style.color = d.color;

  document.getElementById('dpName').textContent  = d.name;
  document.getElementById('dpHead').textContent  = d.head + ' 선생님';
  document.getElementById('dpCount').textContent = '담당자 ' + d.members.length + '명';

  renderMembers(d, searchQuery);
  document.getElementById('deptPopupOverlay').classList.add('active');
}

function closeDeptPopup(){
  document.getElementById('deptPopupOverlay').classList.remove('active');
  document.querySelectorAll('.dept-card').forEach(function(c){ c.classList.remove('active'); });
  activeIdx = null;
}

/* 역할 아이콘 */
var ROLE_ICON_HEAD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>';
var ROLE_ICON_MEMBER = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';

/* ── 멤버 렌더 ── */
function renderMembers(d, q){
  var body = document.getElementById('dpBody');
  body.innerHTML = '';
  var filtered = d.members.filter(function(m){
    if(!q) return true;
    var lq = q.toLowerCase();
    return m.name.includes(q) || m.role.toLowerCase().includes(lq) ||
           m.duties.some(function(du){ return du.includes(q); });
  });
  if(!filtered.length){
    body.innerHTML='<div class="no-result">검색 결과가 없습니다</div>';
    return;
  }
  filtered.forEach(function(m){
    var isHead = (m.role === '부장');
    var avatarIcon  = isHead ? ROLE_ICON_HEAD : ROLE_ICON_MEMBER;
    var avatarBg    = isHead ? d.color : d.color + '22';
    var avatarColor = isHead ? '#fff'  : d.color;
    var card = document.createElement('div');
    card.className = 'member-card';
    card.style.setProperty('--pc', d.color);
    var dutiesHtml = m.duties.map(function(du){
      return '<li>'+hl(escHtml(du),q)+'</li>';
    }).join('');
    card.innerHTML =
      '<div class="member-card-head" style="background:'+d.color+'0D;border-bottom-color:'+d.color+'22">'+
        '<div class="member-avatar" style="background:'+avatarBg+';color:'+avatarColor+'">'+avatarIcon+'</div>'+
        '<div>'+
          '<div class="member-role" style="color:'+d.color+'">'+hl(escHtml(m.role),q)+'</div>'+
          '<div class="member-name">'+hl(escHtml(m.name),q)+' 선생님</div>'+
        '</div>'+
      '</div>'+
      '<ul class="duty-list">'+dutiesHtml+'</ul>';
    body.appendChild(card);
  });
}

/* ── 전체 검색 ── */
function doSearch(q){
  searchQuery = q;
  var trimQ = q.trim();
  document.getElementById('searchClear').classList.toggle('show', !!trimQ);
  var countEl = document.getElementById('searchCount');

  if(!trimQ){
    countEl.style.display='none';
    document.querySelectorAll('.dept-card').forEach(function(c){
      c.classList.remove('search-match','search-dim');
    });
    if(activeIdx!==null) renderMembers(depts[activeIdx],'');
    return;
  }

  var matchCount=0;
  document.querySelectorAll('.dept-card').forEach(function(c){
    var idx = parseInt(c.dataset.idx);
    var d   = depts[idx];
    var lq  = trimQ.toLowerCase();
    var hit = d.name.includes(trimQ) || d.head.includes(trimQ) ||
      d.members.some(function(m){
        return m.name.includes(trimQ) || m.role.toLowerCase().includes(lq) ||
               m.duties.some(function(du){ return du.includes(trimQ); });
      });
    c.classList.toggle('search-match', hit);
    c.classList.toggle('search-dim',  !hit);
    if(hit) matchCount++;
  });

  countEl.style.display='inline';
  countEl.textContent=matchCount+'개 부서 해당';

  var first = document.querySelector('.dept-card.search-match');
  if(first) selectDept(parseInt(first.dataset.idx));
  else if(activeIdx!==null) renderMembers(depts[activeIdx],trimQ);
}

function hl(text, q){
  if(!q) return text;
  var e = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp('('+e+')','gi'),'<mark>$1</mark>');
}
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('globalSearch').addEventListener('input',function(){ doSearch(this.value); });
document.getElementById('searchClear').addEventListener('click',function(){
  document.getElementById('globalSearch').value=''; doSearch('');
  document.getElementById('globalSearch').focus();
});
document.getElementById('deptPopupClose').addEventListener('click', closeDeptPopup);
document.getElementById('deptPopupOverlay').addEventListener('click', function(e){
  if(e.target === this) closeDeptPopup();
});

buildGrid();
