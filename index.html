    .welcome p{display:none}.welcome{margin-bottom:18px}.workspace{grid-template-columns:1fr 1fr;align-items:stretch}.cal-panel,.board-panel{height:650px;min-height:650px;overflow:auto}.cal-panel{display:flex;flex-direction:column}.month-nav{display:flex;align-items:center;gap:5px}.month-nav button{border:1px solid var(--line);background:#fff;min-width:30px;height:30px;border-radius:8px;cursor:pointer;color:var(--navy)}.month-nav button:hover{background:var(--pale)}.month-nav .add-schedule{padding:0 9px;font-size:11px;font-weight:700;background:var(--pale)}.calendar{flex:1;align-content:start;gap:0}.calendar .day{border-radius:0;border:1px solid #EDF0F6;border-right:0;border-bottom:0}.calendar .day:nth-child(7n){border-right:1px solid #EDF0F6}.calendar .day:hover{background:#F7F9FE}.day{cursor:pointer;font:inherit;background:transparent;text-align:left}.day.selected{background:#E7EDFF!important;border-color:#8EA1DB!important}.event-line{display:block;font-size:9px;line-height:16px;height:16px;margin:2px -6px;border-radius:0;padding:0 5px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--event,#718096)}.event-line.line-start{margin-left:0;border-radius:4px 0 0 4px}.event-line.line-end{margin-right:0;border-radius:0 4px 4px 0}.event-line.line-single{margin:2px 0;border-radius:4px}.day-detail{border-top:1px solid var(--line);margin-top:12px;padding-top:12px;min-height:72px}.day-detail-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:7px}.day-detail-item{font-size:11px;color:var(--muted);padding:7px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.day-detail-item b,.day-detail-item small,.day-detail-item a{display:block}.day-detail-item b{font-size:12px;color:var(--text)}.day-detail-item small{margin:3px 0}.day-detail-item a{color:var(--navy);font-weight:700;text-decoration:none}.day-item-actions{display:flex;gap:5px;margin-top:5px}.day-item-actions button{border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--navy);font-size:10px;padding:3px 6px;cursor:pointer}.day-item-actions button:last-child{color:var(--red)}.day-add{border:0;background:var(--pale);color:var(--navy);border-radius:7px;font-size:11px;font-weight:700;padding:6px 9px;cursor:pointer;margin-top:6px}.quick-modal{position:fixed;inset:0;background:rgba(13,24,56,.38);z-index:60;display:grid;place-items:center;padding:18px}.quick-modal[hidden]{display:none}.quick-card{background:#fff;border-radius:16px;width:min(420px,100%);padding:24px;box-shadow:0 20px 55px rgba(12,24,59,.25)}.quick-card h2{font-family:'Noto Serif KR',serif;color:var(--deep);font-size:19px;margin:0 0 15px}.quick-card label{display:block;font-size:12px;font-weight:700;margin:10px 0 5px}.quick-card input,.quick-card textarea,.quick-card select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;background:#fff}.quick-card textarea{min-height:82px;resize:vertical}.quick-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}.quick-actions button{border:0;border-radius:8px;padding:9px 13px;font-weight:700;cursor:pointer}.quick-actions .save{background:var(--navy);color:#fff}.quick-actions .cancel{background:var(--pale);color:var(--navy)}.board-panel .post{width:100%;border:0;background:transparent;text-align:left;font:inherit;color:inherit}@media(max-width:900px){.workspace{grid-template-columns:1fr}.cal-panel,.board-panel{height:auto;min-height:0;overflow:visible}.calendar .day{min-height:56px}}@media(max-width:520px){.month-nav .add-schedule{font-size:0;width:30px;padding:0}.month-nav .add-schedule:after{content:'＋';font-size:17px}}

ge-one{border-radius:6px}.range-hint{margin:8px 0 0;font-size:10px;color:var(--muted);text-align:center}.range-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:7px}.range-actions button{border:0;border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer}.range-clear{background:#fff;color:var(--muted);border:1px solid var(--line)!important}.range-done{background:var(--navy);color:#fff}

<body>
  <header class="topbar">
    <div class="brand" id="logoWrap" title="관리자 모드">
      <img src="logo.png" alt="도개중고등학교 로고"><div><b>도개중고등학교 정보 허브</b><small>DO GAE MIDDLE · HIGH SCHOOL</small></div>
    </div>
    <div class="top-actions"><span class="today" id="todayText"></span><span class="admin-controls" id="adminControls" hidden><span>🔑 관리자 모드</span><button id="adminLogout" type="button">로그아웃</button></span><button class="menu-btn" id="menuBtn" aria-label="메뉴 열기">☰ 메뉴</button></div>
  </header>
  <main class="shell">
    <section class="welcome"><div><h1>오늘의 학교 업무</h1><p>중요 일정과 새 공지를 한 화면에서 확인하세요.</p></div></section>
    <section class="workspace">
      <article class="panel cal-panel"><div class="panel-head"><h2 class="panel-title" id="monthTitle">캘린더</h2><div class="month-nav"><button id="prevMonth" aria-label="이전 달">‹</button><button id="nextMonth" aria-label="다음 달">›</button><button id="addSchedule" class="add-schedule" type="button" hidden>＋ 일정 추가</button></div></div><div class="week"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div class="calendar" id="calendar"></div><div class="day-detail" id="dayDetail"><div class="day-detail-title">날짜를 선택하면 해당 일정이 표시됩니다.</div></div></article>
      <article class="panel board-panel"><div class="board-head"><div><h2 class="panel-title">게시판 <span class="board-count" id="postCount">0</span></h2><p class="board-description">공지사항 및 30일 이내의 다가오는 일정</p></div><button class="notice-add" id="addNotice" type="button" hidden>＋ 공지 등록</button></div><div class="board-list" id="board"><div class="empty loading">공지 정보를 불러오는 중입니다.</div></div></article>
    </section>
  </main>
  <div class="drawer-back" id="drawerBack"></div>
  <aside class="drawer" id="drawer"><div class="drawer-head"><b>메뉴</b><button class="close" id="closeDrawer">×</button></div><a class="nav-link" href="links.html"><span class="nav-icon">🔗</span>링크 모음</a><a class="nav-link" href="mindmap.html"><span class="nav-icon">🧭</span>업무분장</a><a class="nav-link" href="career.html"><span class="nav-icon">🌱</span>진로 활동 탐색기</a><a class="nav-link" href="seating.html"><span class="nav-icon">▦</span>자리 배치표</a><a class="nav-link" href="forms.html"><span class="nav-icon">▤</span>양식 자료실</a></aside>
  <div class="modal-back" id="adminModal"><div class="modal"><h2>관리자 확인</h2><p>관리자 모드에서 공지와 링크를 수정할 수 있습니다.</p><label for="adminId">아이디</label><input id="adminId" autocomplete="username"><label for="adminPw">비밀번호</label><input id="adminPw" type="password" autocomplete="current-password"><div class="error" id="adminError">아이디 또는 비밀번호가 올바르지 않습니다.</div><button id="adminLogin">로그인</button><button class="cancel" id="adminCancel">취소</button></div></div>
  <script>
    const ADMIN_ID='admin', ADMIN_PW='admin';
    let posts=[], departments=[], lastSignature='', viewDate=new Date(), clicks=0, clickTimer;
    const $=id=>document.getElementById(id);
    $('todayText').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function postStart(p){return p.start||p.deadline||''} function postEnd(p){return p.end||p.deadline||p.start||''}
    function dateNum(v){return v?Number(v.replaceAll('-','')):0} function dueText(p){const e=postEnd(p);return e?e.slice(5).replace('-','.'):'상시'}
    function color(p){return p.link?'#3E6B8A':p.start?'#1E7C5A':'#718096'}
    function renderCalendar(){const y=viewDate.getFullYear(),m=viewDate.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date().toISOString().slice(0,10);$('monthTitle').textContent=new Date(y,m,1).toLocaleDateString('ko-KR',{year:'numeric',month:'long'});let html='';for(let i=0;i<first;i++)html+='<div class="day blank"></div>';for(let d=1;d<=days;d++){const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const list=posts.filter(p=>{const s=postStart(p),e=postEnd(p);return s&&dateNum(key)>=dateNum(s)&&dateNum(key)<=dateNum(e)}).slice(0,3);const dow=(first+d-1)%7;html+=`<div class="day ${key===today?'today ':''}${dow===0?'sun ':dow===6?'sat':''}"><span class="day-num">${d}</span>${list.map(p=>`<div class="event-dot" title="${esc(p.content)}" style="--event:${color(p)}"></div>`).join('')}</div>`;}$('calendar').innerHTML=html;}
    function renderBoard(){const now=new Date().toISOString().slice(0,10);const list=posts.filter(p=>!postEnd(p)||postEnd(p)>=now).sort((a,b)=>{const ad=postEnd(a)||'9999-12-31',bd=postEnd(b)||'9999-12-31';return ad.localeCompare(bd)}).slice(0,12);$('postCount').textContent=list.length;$('board').innerHTML=list.length?list.map(p=>`<a class="post" href="dashboard.html" style="color:inherit;text-decoration:none"><span class="post-mark" style="--color:${color(p)}"></span><span><span class="post-title">${esc(p.content)}</span><span class="post-meta">${esc(p.author||'작성자 미지정')}${p.dept?' · '+esc(p.dept):''}</span></span><span class="post-date">${dueText(p)}</span></a>`).join(''):'<div class="empty">표시할 공지가 없습니다.</div>';}
    function render(){renderCalendar();renderBoard();}
    async function sync(){try{const r=await fetch('/api/dashboard');const data=await r.json();if(!r.ok)throw Error(data.error);const signature=JSON.stringify({posts:data.posts||[],departments:data.departments||[]});if(signature===lastSignature)return;lastSignature=signature;posts=data.posts||[];departments=data.departments||[];render();}catch(e){if(!lastSignature)$('board').innerHTML='<div class="empty">공지 정보를 불러오지 못했습니다.</div>';console.warn(e);}}
    $('prevMonth').onclick=()=>window.changeCalendarMonth(-1);$('nextMonth').onclick=()=>window.changeCalendarMonth(1);
    function drawer(open){$('drawer').classList.toggle('open',open);$('drawerBack').classList.toggle('open',open)}$('menuBtn').onclick=()=>drawer(true);$('closeDrawer').onclick=()=>drawer(false);$('drawerBack').onclick=()=>drawer(false);
    function updateAdmin(){const on=sessionStorage.getItem('isAdmin')==='true';$('adminControls').hidden=!on;if(window.updateHomeAdmin)window.updateHomeAdmin()}
    $('logoWrap').onclick=()=>{if(sessionStorage.getItem('isAdmin')==='true')return;clicks++;clearTimeout(clickTimer);if(clicks>=5){clicks=0;$('adminModal').classList.add('show');$('adminId').focus()}else clickTimer=setTimeout(()=>clicks=0,2000)};
    $('adminLogin').onclick=()=>{if($('adminId').value.trim()===ADMIN_ID&&$('adminPw').value===ADMIN_PW){sessionStorage.setItem('isAdmin','true');$('adminModal').classList.remove('show');updateAdmin()}else $('adminError').style.display='block'};$('adminLogout').onclick=()=>{sessionStorage.removeItem('isAdmin');updateAdmin()};$('adminCancel').onclick=()=>$('adminModal').classList.remove('show');$('adminModal').onclick=e=>{if(e.target===$('adminModal'))$('adminModal').classList.remove('show')};
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){drawer(false);$('adminModal').classList.remove('show')}if(e.key==='Enter'&&$('adminModal').classList.contains('show'))$('adminLogin').click()});
    updateAdmin();sync();setInterval(sync,30000);
  </script>
  <script src="home.js"></script>
</body>
