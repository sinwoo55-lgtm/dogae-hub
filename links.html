<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>링크 모음 · 도개중고등학교</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#253E8A;--deep:#17245D;--pale:#EEF2FB;--bg:#F3F5FA;--line:#DCE2F0;--text:#1B253D;--muted:#68748A}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}.head{height:68px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 clamp(16px,4vw,52px);gap:14px}.back{width:38px;height:38px;border:1px solid var(--line);border-radius:10px;display:grid;place-items:center;text-decoration:none;color:var(--navy);font-size:23px}.brand{display:flex;align-items:center;gap:10px}.brand img{width:35px;height:35px}.brand b{font-family:'Noto Serif KR',serif;color:var(--deep);font-size:16px}.brand small{display:block;color:var(--muted);font-size:10px;margin-top:1px}.shell{max-width:1080px;margin:0 auto;padding:42px clamp(16px,4vw,52px) 60px}.eyebrow{color:var(--navy);font-size:11px;font-weight:700;letter-spacing:.12em}.title{font-family:'Noto Serif KR',serif;color:var(--deep);font-size:clamp(27px,4vw,38px);margin:7px 0}.intro{color:var(--muted);font-size:13px;margin:0 0 27px}.search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:0 15px;box-shadow:0 6px 20px rgba(26,43,91,.05)}.search svg{width:18px;color:var(--muted)}.search input{width:100%;border:0;outline:0;padding:15px 0;font:inherit;font-size:14px;background:transparent}.result{font-size:12px;color:var(--muted);margin:16px 2px}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid var(--line);border-left:5px solid var(--color,#253E8A);border-radius:13px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:.18s}.item:hover{transform:translateX(3px);box-shadow:0 9px 24px rgba(25,43,106,.1);border-color:var(--color,#253E8A)}.item h2{font-size:16px;margin:0 0 6px;color:var(--deep);word-break:keep-all}.item p{font-size:13px;line-height:1.6;color:var(--muted);margin:0;word-break:keep-all}.item .url{font-size:11px;color:#9AA6BC;margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:720px}.go{color:var(--navy);font-size:13px;font-weight:700;white-space:nowrap}.empty{background:#fff;border:1px dashed #B8C3DB;border-radius:13px;text-align:center;padding:80px 20px;color:var(--muted);font-size:13px}@media(max-width:540px){.shell{padding-top:28px}.item{padding:15px;grid-template-columns:1fr}.go{display:none}.item .url{max-width:260px}}
  </style>
  <style>header{visibility:hidden}</style>
</head>
<body>
  <header class="head"><a class="back" href="index.html" aria-label="메인으로">‹</a><div class="brand"><img src="logo.png" alt="로고"><div><b>도개중고등학교 정보 허브</b><small>LINK DIRECTORY</small></div></div></header>
  <main class="shell"><span class="eyebrow">QUICK ACCESS</span><h1 class="title">링크 모음</h1><p class="intro">자주 사용하는 학교·교육 업무 사이트를 빠르게 찾아보세요.</p><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><input id="query" type="search" autocomplete="off" placeholder="제목 또는 설명으로 검색"></div><p class="result" id="result">링크를 불러오는 중입니다.</p><section class="list" id="list"><div class="empty">링크를 불러오는 중입니다.</div></section></main>
  <script>
    let links=[],signature='';
    const colors=['#253E8A','#1E7C5A','#B5500A','#6B3FA0','#3E6B8A','#B14A3B'];
    const esc=v=>String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    function render(){const q=document.getElementById('query').value.trim().toLowerCase();const found=links.filter(l=>!q||(l.title||'').toLowerCase().includes(q)||(l.desc||'').toLowerCase().includes(q));document.getElementById('result').textContent=q?`“${document.getElementById('query').value}” 검색 결과 ${found.length}개`:`등록된 링크 ${found.length}개`;document.getElementById('list').innerHTML=found.length?found.map((l,i)=>`<a class="item" href="${esc(l.url)}" target="_blank" rel="noopener noreferrer" style="--color:${colors[i%colors.length]}"><span><h2>${esc(l.title)}</h2><p>${esc(l.desc||'설명이 등록되지 않았습니다.')}</p><div class="url">${esc(l.url)}</div></span><span class="go">바로가기 ↗</span></a>`).join(''):'<div class="empty">조건에 맞는 링크가 없습니다.</div>'}
    async function sync(){try{const r=await fetch('/api/dashboard'),data=await r.json();if(!r.ok)throw Error(data.error);const next=JSON.stringify(data.links||[]);if(next===signature)return;signature=next;links=data.links||[];render()}catch(e){if(!signature)document.getElementById('list').innerHTML='<div class="empty">링크를 불러오지 못했습니다.</div>';console.warn(e)}}
    document.getElementById('query').addEventListener('input',render);sync();setInterval(sync,30000);
  </script>
<script src="nav.js"></script>
</body>
</html>
