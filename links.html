<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>링크 모음 · 도개중고등학교</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#253E8A;--deep:#17245D;--pale:#EEF2FB;--bg:#F3F5FA;--line:#DCE2F0;--text:#1B253D;--muted:#68748A}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}.head{height:68px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 clamp(16px,4vw,52px);gap:14px}.back{width:38px;height:38px;border:1px solid var(--line);border-radius:10px;display:grid;place-items:center;text-decoration:none;color:var(--navy);font-size:23px}.brand{display:flex;align-items:center;gap:10px}.brand img{width:35px;height:35px}.brand b{font-family:'Noto Serif KR',serif;color:var(--deep);font-size:16px}.brand small{display:block;color:var(--muted);font-size:10px;margin-top:1px}.shell{max-width:1080px;margin:0 auto;padding:42px clamp(16px,4vw,52px) 60px}.eyebrow{color:var(--navy);font-size:11px;font-weight:700;letter-spacing:.12em}.title{font-family:'Noto Serif KR',serif;color:var(--deep);font-size:clamp(27px,4vw,38px);margin:7px 0}.intro{color:var(--muted);font-size:13px;margin:0 0 27px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:14px}.admin-add{border:0;border-radius:9px;background:var(--navy);color:#fff;padding:10px 13px;font:700 12px 'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}.admin-add[hidden]{display:none}.search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:0 15px;box-shadow:0 6px 20px rgba(26,43,91,.05)}.search svg{width:18px;color:var(--muted)}.search input{width:100%;border:0;outline:0;padding:15px 0;font:inherit;font-size:14px;background:transparent}.result{font-size:12px;color:var(--muted);margin:16px 2px}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid var(--line);border-left:5px solid var(--color,#253E8A);border-radius:13px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;transition:.18s}.item:hover{transform:translateX(3px);box-shadow:0 9px 24px rgba(25,43,106,.1);border-color:var(--color,#253E8A)}.item-link{min-width:0;text-decoration:none;color:inherit}.item h2{font-size:16px;margin:0 0 6px;color:var(--deep);word-break:keep-all}.item p{font-size:13px;line-height:1.6;color:var(--muted);margin:0;word-break:keep-all}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:3px 7px;background:var(--pale);color:var(--navy);font-size:10px;font-weight:700}.go{color:var(--navy);font-size:13px;font-weight:700;white-space:nowrap}.item-tools{display:flex;gap:6px;opacity:0;transition:.16s}.item:hover .item-tools,.item:focus-within .item-tools{opacity:1}.item-tools button{border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--navy);padding:6px 8px;font:700 11px 'Noto Sans KR',sans-serif;cursor:pointer}.item-tools .delete{color:#B4232D}.empty{background:#fff;border:1px dashed #B8C3DB;border-radius:13px;text-align:center;padding:80px 20px;color:var(--muted);font-size:13px}.link-modal{position:fixed;inset:0;z-index:950;background:rgba(13,24,56,.38);display:grid;place-items:center;padding:18px}.link-modal[hidden]{display:none}.link-card{width:min(480px,100%);border-radius:16px;background:#fff;padding:24px;box-shadow:0 20px 55px rgba(12,24,59,.25)}.link-card h2{margin:0 0 15px;color:var(--deep);font-family:'Noto Serif KR',serif;font-size:20px}.link-card label{display:block;margin:11px 0 5px;font-size:12px;font-weight:700}.link-card input,.link-card textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit}.link-card textarea{min-height:86px;resize:vertical}.link-form-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:16px}.link-form-actions button{border:0;border-radius:8px;padding:9px 13px;font:700 12px 'Noto Sans KR',sans-serif;cursor:pointer}.link-save{background:var(--navy);color:#fff}.link-cancel{background:var(--pale);color:var(--navy)}@media(max-width:540px){.shell{padding-top:28px}.item{padding:15px;grid-template-columns:1fr}.go{display:none}.item-tools{opacity:1}.section-head{align-items:start;flex-direction:column}.admin-add{align-self:flex-end}}
  </style>
  <style>header{visibility:hidden}</style>
</head>
<body>
  <header class="head"><a class="back" href="index.html" aria-label="메인으로">‹</a><div class="brand"><img src="logo.png" alt="로고"><div><b>도개중고등학교 정보 허브</b><small>LINK DIRECTORY</small></div></div></header>
  <main class="shell"><div class="section-head"><div><span class="eyebrow">QUICK ACCESS</span><h1 class="title">링크 모음</h1><p class="intro">자주 사용하는 학교·교육 업무 사이트를 빠르게 찾아보세요.</p></div><button class="admin-add" id="addLink" hidden>＋ 링크 추가</button></div><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><input id="query" type="search" autocomplete="off" placeholder="제목 또는 설명으로 검색"></div><p class="result" id="result">링크를 불러오는 중입니다.</p><section class="list" id="list"><div class="empty">링크를 불러오는 중입니다.</div></section></main>
  <div class="link-modal" id="linkModal" hidden><form class="link-card" id="linkForm"><h2 id="linkModalTitle">링크 추가</h2><label for="linkTitle">제목</label><input id="linkTitle" maxlength="40" required><label for="linkUrl">주소</label><input id="linkUrl" type="url" placeholder="https://..." maxlength="1000" required><label for="linkDesc">설명 (선택)</label><textarea id="linkDesc" maxlength="200"></textarea><label for="linkTags">태그 (쉼표로 구분, 최대 10개)</label><input id="linkTags" maxlength="200" placeholder="예: 나이스, 성적, 교무"><div class="link-form-actions"><button class="link-cancel" type="button" id="linkCancel">취소</button><button class="link-save" type="submit">저장</button></div></form></div>
  <script>
    let links=[],signature='',editingLinkId='';
    const colors=['#253E8A','#1E7C5A','#B5500A','#6B3FA0','#3E6B8A','#B14A3B'];
    const esc=v=>String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const admin=()=>sessionStorage.getItem('isAdmin')==='true';
    const tags=link=>(Array.isArray(link.tags)?link.tags:[]).filter(Boolean);
    function render(){const q=document.getElementById('query').value.trim().toLowerCase(),canEdit=admin();const found=links.filter(l=>!q||(l.title||'').toLowerCase().includes(q)||(l.desc||'').toLowerCase().includes(q)||tags(l).join(' ').toLowerCase().includes(q));document.getElementById('addLink').hidden=!canEdit;document.getElementById('result').textContent=q?`“${document.getElementById('query').value}” 검색 결과 ${found.length}개`:`등록된 링크 ${found.length}개`;document.getElementById('list').innerHTML=found.length?found.map((l,i)=>`<article class="item" style="--color:${colors[i%colors.length]}"><a class="item-link" href="${esc(l.url)}" target="_blank" rel="noopener noreferrer"><h2>${esc(l.title)}</h2><p>${esc(l.desc||'설명이 등록되지 않았습니다.')}</p>${tags(l).length?`<div class="tags">${tags(l).map(tag=>`<span class="tag"># ${esc(tag)}</span>`).join('')}</div>`:''}</a>${canEdit?`<span class="item-tools"><button type="button" data-link-edit="${esc(l.id)}">수정</button><button type="button" class="delete" data-link-delete="${esc(l.id)}">삭제</button></span>`:'<span class="go">바로가기 ↗</span>'}</article>`).join(''):'<div class="empty">조건에 맞는 링크가 없습니다.</div>';if(canEdit){document.querySelectorAll('[data-link-edit]').forEach(button=>button.onclick=()=>openEditor(links.find(link=>link.id===button.dataset.linkEdit)));document.querySelectorAll('[data-link-delete]').forEach(button=>button.onclick=()=>removeLink(button.dataset.linkDelete));}}
    async function sync(){try{const r=await fetch('/api/dashboard'),data=await r.json();if(!r.ok)throw Error(data.error);const next=JSON.stringify(data.links||[]);if(next===signature)return;signature=next;links=data.links||[];render()}catch(e){if(!signature)document.getElementById('list').innerHTML='<div class="empty">링크를 불러오지 못했습니다.</div>';console.warn(e)}}
    function openEditor(link){if(!admin())return;editingLinkId=link?link.id:'';document.getElementById('linkModalTitle').textContent=link?'링크 수정':'링크 추가';document.getElementById('linkTitle').value=link?link.title:'';document.getElementById('linkUrl').value=link?link.url:'';document.getElementById('linkDesc').value=link?link.desc||'':'';document.getElementById('linkTags').value=link?tags(link).join(', '):'';document.getElementById('linkModal').hidden=false;document.getElementById('linkTitle').focus()}
    function closeEditor(){document.getElementById('linkModal').hidden=true;editingLinkId=''}
    async function saveLink(){if(!admin())return;const data={title:document.getElementById('linkTitle').value.trim(),url:document.getElementById('linkUrl').value.trim(),desc:document.getElementById('linkDesc').value.trim(),tags:[...new Set(document.getElementById('linkTags').value.split(',').map(tag=>tag.trim()).filter(Boolean))]};const r=await fetch('/api/dashboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'link:save',id:editingLinkId,data})}),result=await r.json();if(!r.ok)throw Error(result.error||'링크를 저장하지 못했습니다.');closeEditor();signature='';await sync()}
    async function removeLink(id){if(!admin()||!confirm('이 링크를 삭제할까요?'))return;const r=await fetch('/api/dashboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'link:delete',id})}),result=await r.json();if(!r.ok)throw Error(result.error||'링크를 삭제하지 못했습니다.');signature='';await sync()}
    document.getElementById('query').addEventListener('input',render);document.getElementById('addLink').onclick=()=>openEditor(null);document.getElementById('linkCancel').onclick=closeEditor;document.getElementById('linkModal').onclick=e=>{if(e.target===e.currentTarget)closeEditor()};document.getElementById('linkForm').onsubmit=async e=>{e.preventDefault();try{await saveLink()}catch(error){alert(error.message)}};window.addEventListener('hub-admin-change',render);sync();setInterval(sync,30000);
  </script>
<script src="nav.js"></script>
</body>
</html>
