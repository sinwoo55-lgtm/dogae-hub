<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>학생관리 · 도개중고등학교</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet"><style>
:root{--navy:#253E8A;--deep:#17245D;--bg:#F3F5FA;--surface:#fff;--line:#DCE2F0;--text:#1B253D;--muted:#68748A;--pale:#EEF2FB}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}.head{height:68px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 28px}.back{color:var(--navy);text-decoration:none;font-weight:700}.layout{min-height:calc(100vh - 68px);display:grid;grid-template-columns:220px 1fr}.side{background:var(--surface);border-right:1px solid var(--line);padding:24px 14px}.side b{display:block;padding:0 10px 14px;color:var(--deep);font-family:'Noto Serif KR',serif}.side button{display:block;width:100%;padding:12px;border:0;border-radius:9px;background:transparent;color:var(--text);text-align:left;font:600 13px inherit;cursor:pointer}.side button.active,.side button:hover{background:var(--pale);color:var(--navy)}.main{padding:30px;max-width:1400px;width:100%;margin:auto}.page-title{font:700 28px 'Noto Serif KR',serif;color:var(--deep);margin:0 0 5px}.desc{margin:0 0 22px;color:var(--muted);font-size:13px}.toolbar,.class-picker,.activity-top{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.toolbar{justify-content:space-between;margin-bottom:16px}.chip,.button{border:1px solid var(--line);border-radius:9px;padding:9px 12px;background:var(--surface);color:var(--navy);font:600 12px inherit;cursor:pointer}.chip.active,.button.primary{background:var(--navy);color:#fff;border-color:var(--navy)}.button.danger{color:#B4232D}.panel{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:20px;margin-top:15px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.panel h2{font:700 18px 'Noto Serif KR',serif;color:var(--deep);margin:0}.search{padding:10px 12px;border:1px solid var(--line);border-radius:9px;font:13px inherit;min-width:220px;background:var(--surface);color:var(--text)}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{cursor:pointer;color:var(--muted);font-size:11px}.status{font-size:11px;border-radius:999px;padding:3px 7px;background:var(--pale);color:var(--navy)}.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-top:1px solid var(--line);border-left:1px solid var(--line)}.cal-head,.day{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:98px;padding:7px}.cal-head{min-height:auto;text-align:center;font-size:11px;font-weight:700;color:var(--muted)}.day{cursor:pointer}.day:hover{background:var(--pale)}.day-num{font-weight:700;font-size:12px}.event{display:block;margin-top:5px;padding:3px 5px;border-radius:4px;background:#253E8A;color:#fff;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.empty{padding:55px 15px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:12px}.activity{padding:15px 0;border-bottom:1px solid var(--line);cursor:pointer}.activity:last-child{border:0}.activity b{color:var(--deep)}.meta{font-size:12px;color:var(--muted);margin-top:5px}.hidden{display:none!important}.modal{position:fixed;inset:0;background:rgba(13,24,56,.42);z-index:1000;display:grid;place-items:center;padding:16px}.modal[hidden]{display:none}.card{background:var(--surface);color:var(--text);width:min(720px,100%);max-height:90vh;overflow:auto;border-radius:16px;padding:24px}.card h2{margin:0 0 16px;color:var(--deep);font:700 20px 'Noto Serif KR',serif}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{font-size:12px;font-weight:700}.form input,.form textarea,.form select{display:block;width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:9px;font:13px inherit;background:var(--surface);color:var(--text)}.form textarea{min-height:90px;resize:vertical}.wide{grid-column:1/-1}.student-options{max-height:190px;overflow:auto;border:1px solid var(--line);border-radius:9px;padding:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.student-options label{font-weight:400;font-size:12px}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.notice{padding:11px 13px;background:var(--pale);border-radius:9px;color:var(--navy);font-size:12px;margin:10px 0}.loader{text-align:center;padding:70px;color:var(--muted)}@media(max-width:760px){.layout{grid-template-columns:1fr}.side{display:flex;gap:4px;padding:9px;overflow:auto}.side b{display:none}.side button{white-space:nowrap;width:auto}.main{padding:18px}.form{grid-template-columns:1fr}.student-options{grid-template-columns:repeat(2,1fr)}.day{min-height:72px}.search{min-width:0;width:100%}}
</style><style>header{visibility:hidden}</style><script src="theme.js"></script><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script></head><body>
<header class="head"><a class="back" href="index.html">← 메인</a></header><div class="layout"><aside class="side"><b>학생관리</b><button class="active" data-view="roster">👥 학생 명렬 및 캘린더</button><button data-view="activities">📋 활동 등록 및 게시판</button></aside><main class="main">
<section id="rosterView"><h1 class="page-title">학생 명렬 및 캘린더</h1><p class="desc">학년과 학급을 선택하면 명렬과 해당 학급의 활동 일정을 확인할 수 있습니다.</p><div class="class-picker" id="classPicker"></div><div class="toolbar"><input class="search" id="rosterSearch" placeholder="번호 또는 학생 이름 검색"><span id="rosterAdmin" class="hidden"><button class="button primary" id="uploadBtn">엑셀 명단 업로드</button><button class="button" id="studentAddBtn">학생 추가·학적 변동</button></span></div><div class="panel"><div class="panel-head"><h2 id="rosterTitle">학급을 선택해주세요</h2><span class="meta" id="rosterCount"></span></div><div class="table-wrap"><table><thead><tr><th data-sort="number">번호 ↕</th><th data-sort="name">이름 ↕</th><th data-sort="status">학적 상태 ↕</th><th>변동일</th></tr></thead><tbody id="rosterBody"></tbody></table></div></div><div class="panel"><div class="panel-head"><h2 id="calendarTitle">학급 활동 캘린더</h2><div><button class="chip" id="prevMonth">‹</button><button class="chip" id="todayMonth">오늘</button><button class="chip" id="nextMonth">›</button></div></div><div class="calendar" id="calendar"></div></div></section>
<section id="activitiesView" class="hidden"><h1 class="page-title">활동 등록 및 게시판</h1><p class="desc">학생이 참여하는 활동을 등록하고 일정별로 확인합니다.</p><div class="toolbar"><input class="search" id="activitySearch" placeholder="활동명·설명·지도교사 검색"><span><button class="chip" id="pastToggle">지난 일정 보기</button><button class="button primary" id="activityAddBtn">＋ 활동 등록</button></span></div><div class="panel"><div id="activityList"></div></div></section>
</main></div>
<div class="modal" id="detailModal" hidden><div class="card"><h2 id="detailTitle"></h2><p class="meta" id="detailMeta"></p><p id="detailDesc"></p><div class="panel"><b>참여 학생</b><div id="detailStudents" class="meta"></div></div><div class="actions"><button class="button" id="detailClose">닫기</button></div></div></div>
<div class="modal" id="studentModal" hidden><form class="card" id="studentForm"><h2>학생 정보 관리</h2><div class="form"><label>학년<input name="grade" required></label><label>반<input name="classNo" required></label><label>번호<input name="number" required></label><label>이름<input name="name" required></label><label>학적 상태<select name="status"><option>재학</option><option>전입</option><option>전출</option></select></label><label>변동일<input name="changedAt" type="date"></label></div><div class="actions"><button type="button" class="button cancel">취소</button><button class="button primary">저장</button></div></form></div>
<div class="modal" id="activityModal" hidden><form class="card" id="activityForm"><h2>활동 등록</h2><div class="form"><label>지도교사<input name="teacher" required></label><label>활동명<input name="title" required></label><label>시작일<input name="startDate" type="date" required></label><label>종료일<input name="endDate" type="date" required></label><label class="wide">설명<textarea name="description" placeholder="활동 내용을 입력하세요"></textarea></label><label class="wide">참여 학생 <span class="meta">학년·반을 선택해 복수 선택하세요</span><div class="class-picker" id="participantClasses"></div><div class="student-options" id="participantList"></div></label></div><div class="actions"><button type="button" class="button cancel">취소</button><button class="button primary">저장</button></div></form></div>
<input id="fileInput" type="file" accept=".xlsx,.xls,.csv" hidden><script>
let students=[],activities=[],selectedClass='',sortKey='number',sortAsc=true,viewDate=new Date(),showPast=false,editingStudent='',editingActivity='';const $=id=>document.getElementById(id),admin=()=>sessionStorage.getItem('isAdmin')==='true';
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const dateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const activeStudents=()=>students.filter(s=>s.status!=='전출');const classes=()=>[...new Set(activeStudents().map(s=>`${s.grade}-${s.classNo}`))].sort((a,b)=>a.localeCompare(b,'ko',{numeric:true}));
async function api(method='GET',body){const r=await fetch('/api/students',{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});const data=await r.json();if(!r.ok)throw Error(data.error||'요청에 실패했습니다.');return data}async function load(){try{const data=await api();students=data.students||[];activities=data.activities||[];if(!selectedClass&&classes()[0])selectedClass=classes()[0];render()}catch(e){document.querySelectorAll('.panel').forEach(p=>p.innerHTML='<div class="empty">정보를 불러오지 못했습니다.</div>');console.warn(e)}}
function render(){renderClasses();renderRoster();renderCalendar();renderActivities();$('rosterAdmin').classList.toggle('hidden',!admin())}function renderClasses(){const button=c=>`<button class="chip ${selectedClass===c?'active':''}" data-class="${c}">${c.replace('-','학년 ')+'반'}</button>`;$('classPicker').innerHTML=classes().map(button).join('')||'<span class="meta">등록된 명단이 없습니다.</span>';$('classPicker').querySelectorAll('[data-class]').forEach(b=>b.onclick=()=>{selectedClass=b.dataset.class;render()})}function classStudents(){return activeStudents().filter(s=>`${s.grade}-${s.classNo}`===selectedClass)}
function renderRoster(){const [g,c]=(selectedClass||'-').split('-'),q=$('rosterSearch').value.trim().toLowerCase();let rows=classStudents().filter(s=>!q||s.name.includes(q)||s.number.includes(q));rows.sort((a,b)=>String(a[sortKey]).localeCompare(String(b[sortKey]),'ko',{numeric:true})*(sortAsc?1:-1));$('rosterTitle').textContent=selectedClass?`${g}학년 ${c}반 학생 명렬`:'학급을 선택해주세요';$('rosterCount').textContent=selectedClass?`${rows.length}명`:'';$('rosterBody').innerHTML=rows.length?rows.map(s=>`<tr><td>${esc(s.number)}</td><td>${esc(s.name)}</td><td><span class="status">${esc(s.status)}</span></td><td>${esc(s.changedAt||'-')}</td></tr>`).join(''):'<tr><td colspan="4" class="empty">표시할 학생이 없습니다.</td></tr>'}
function renderCalendar(){const y=viewDate.getFullYear(),m=viewDate.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),ids=new Set(classStudents().map(s=>s.id));$('calendarTitle').textContent=selectedClass?`${selectedClass.replace('-','학년 ')}반 · ${y}년 ${m+1}월`: '학급 활동 캘린더';let html=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-head">${d}</div>`).join('');html+='<div class="day" style="visibility:hidden"></div>'.repeat(first);for(let d=1;d<=days;d++){const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,list=activities.filter(a=>a.startDate<=key&&a.endDate>=key&&a.participants.some(id=>ids.has(id)));html+=`<div class="day" data-day="${key}"><div class="day-num">${d}</div>${list.slice(0,3).map(a=>`<span class="event">${esc(a.title)}</span>`).join('')}${list.length>3?`<span class="meta">+${list.length-3}개</span>`:''}</div>`}$('calendar').innerHTML=html;$('calendar').querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>openDay(el.dataset.day))}
function renderActivities(){const now=dateKey(new Date()),q=$('activitySearch').value.trim().toLowerCase();let list=activities.filter(a=>(showPast||a.endDate>=now)&&(!q||[a.title,a.description,a.teacher].join(' ').toLowerCase().includes(q))).sort((a,b)=>(a.endDate<now?1:0)-(b.endDate<now?1:0)||a.startDate.localeCompare(b.startDate));$('pastToggle').classList.toggle('active',showPast);$('activityList').innerHTML=list.length?list.map(a=>`<article class="activity" data-activity="${a.id}"><b>${esc(a.title)}</b><div class="meta">${esc(a.teacher)} · ${a.startDate} ~ ${a.endDate} · 참여 ${a.participants.length}명</div>${a.description?`<div class="meta">${esc(a.description)}</div>`:''}</article>`).join(''):'<div class="empty">표시할 활동이 없습니다.</div>';$('activityList').querySelectorAll('[data-activity]').forEach(el=>el.onclick=()=>openActivity(el.dataset.activity))}
function openDay(day){const ids=new Set(classStudents().map(s=>s.id)),list=activities.filter(a=>a.startDate<=day&&a.endDate>=day&&a.participants.some(id=>ids.has(id)));if(!list.length)return;$('detailTitle').textContent=`${day} 활동`;showDetail(list)}function openActivity(id){const a=activities.find(x=>x.id===id);if(a)showDetail([a])}function showDetail(list){$('detailMeta').textContent=list.map(a=>`${a.teacher} · ${a.startDate} ~ ${a.endDate}`).join('\n');$('detailDesc').textContent=list.map(a=>a.description).filter(Boolean).join('\n');const ids=new Set(list.flatMap(a=>a.participants));$('detailStudents').textContent=students.filter(s=>ids.has(s.id)).map(s=>`${s.grade}-${s.classNo} ${s.number}번 ${s.name}`).join(', ');$('detailModal').hidden=false}
function openStudent(s){if(!admin())return;editingStudent=s?.id||'';const f=$('studentForm');for(const k of ['grade','classNo','number','name','status','changedAt'])f.elements[k].value=s?.[k]|| (k==='status'?'재학':'');$('studentModal').hidden=false}function renderParticipantClasses(){const box=$('participantClasses');box.innerHTML=classes().map(c=>`<button type="button" class="chip ${c===selectedClass?'active':''}" data-pclass="${c}">${c.replace('-','학년 ')+'반'}</button>`).join('');box.querySelectorAll('[data-pclass]').forEach(b=>b.onclick=()=>{selectedClass=b.dataset.pclass;renderParticipantStudents()});renderParticipantStudents()}function renderParticipantStudents(){const previous=new Set([...document.querySelectorAll('#participantList input:checked')].map(i=>i.value));$('participantList').innerHTML=classStudents().map(s=>`<label><input type="checkbox" value="${s.id}" ${previous.has(s.id)?'checked':''}> ${s.number} ${esc(s.name)}</label>`).join('')||'학급을 선택해주세요'}function openActivityForm(a){editingActivity=a?.id||'';const f=$('activityForm');for(const k of ['teacher','title','description','startDate','endDate'])f.elements[k].value=a?.[k]||'';$('activityModal').hidden=false;renderParticipantClasses();if(a){const ids=new Set(a.participants);$('participantList').querySelectorAll('input').forEach(i=>i.checked=ids.has(i.value))}}
$('rosterSearch').oninput=renderRoster;$('activitySearch').oninput=renderActivities;document.querySelectorAll('th[data-sort]').forEach(th=>th.onclick=()=>{sortAsc=sortKey===th.dataset.sort?!sortAsc:true;sortKey=th.dataset.sort;renderRoster()});$('prevMonth').onclick=()=>{viewDate.setMonth(viewDate.getMonth()-1);renderCalendar()};$('nextMonth').onclick=()=>{viewDate.setMonth(viewDate.getMonth()+1);renderCalendar()};$('todayMonth').onclick=()=>{viewDate=new Date();renderCalendar()};$('pastToggle').onclick=()=>{showPast=!showPast;renderActivities()};$('activityAddBtn').onclick=()=>openActivityForm();$('studentAddBtn').onclick=()=>openStudent();$('detailClose').onclick=()=>{$('detailModal').hidden=true};document.querySelectorAll('.cancel').forEach(b=>b.onclick=()=>b.closest('.modal').hidden=true);
$('studentForm').onsubmit=async e=>{e.preventDefault();try{await api('POST',{action:'roster:save',id:editingStudent,data:Object.fromEntries(new FormData(e.target))});$('studentModal').hidden=true;load()}catch(err){alert(err.message)}};$('activityForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));data.participants=[...$('participantList').querySelectorAll('input:checked')].map(i=>i.value);try{await api('POST',{action:'activity:save',id:editingActivity,data});$('activityModal').hidden=true;load()}catch(err){alert(err.message)}};$('uploadBtn').onclick=()=>$('fileInput').click();$('fileInput').onchange=async e=>{const file=e.target.files[0];if(!file)return;try{if(!window.XLSX)throw Error('엑셀 읽기 도구를 불러오지 못했습니다.');const wb=XLSX.read(await file.arrayBuffer(),{type:'array'}),rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});const data=rows.map(r=>({grade:r['학년'],classNo:r['반']??r['학급'],number:r['번호'],name:r['이름'],status:r['학적 상태']||'재학',changedAt:r['변동일']||''}));await api('POST',{action:'roster:upload',data});alert(`${data.length}명의 명단을 반영했습니다.`);load()}catch(err){alert(err.message)}finally{e.target.value=''}};document.querySelectorAll('.side button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.side button').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('rosterView').classList.toggle('hidden',b.dataset.view!=='roster');$('activitiesView').classList.toggle('hidden',b.dataset.view!=='activities')});window.addEventListener('hub-admin-change',render);load();setInterval(load,30000);
</script><script src="nav.js"></script></body></html>
