#rosterView .table-wrap{display:flex}#rosterView .roster-cards{flex:1;min-height:100%}.roster-card{position:relative}.roster-card .status{position:absolute;left:50%;top:calc(50% + 13px);transform:translateX(-50%);white-space:nowrap}.roster-card.single-class .roster-student{transform:translateY(-7px)}.roster-card.single-class:has(.status) .roster-student{transform:translateY(-13px)}.roster-empty{width:100%;height:100%;min-height:0}

<header class="head"><a class="back" href="index.html">← 메인</a></header><div class="layout"><aside class="side"><b>학생관리</b><button class="active" data-view="roster">👥 학생 명렬 및 캘린더</button><button data-view="discipline">📋 지적사항 조회</button></aside><main class="main">
<section id="rosterView"><h1 class="page-title">학생 명렬 및 캘린더</h1><p class="desc">학급을 선택해 학생 명렬과 참여 활동을 한 번에 확인합니다.</p><div class="toolbar"><div class="class-controls"><div class="class-picker" id="classPicker"></div><label class="meta"><input type="checkbox" id="showStatus"> 학적 상태 보기</label></div><span id="rosterAdmin" class="hidden"><button class="button primary" id="uploadBtn">엑셀 명단 업로드</button><button class="button" id="studentAddBtn">학생 추가·학적 변동</button></span></div><div class="student-grid"><div class="panel"><div class="panel-head"><div><h2 id="rosterTitle">학생 명렬</h2><span class="meta" id="rosterCount"></span></div><input class="search" id="rosterSearch" placeholder="번호 또는 학생 이름 검색" disabled></div><div class="table-wrap"><div class="roster-cards" id="rosterBody"></div></div></div><div class="panel"><div class="panel-head"><div><h2 id="calendarTitle">학생 활동 캘린더</h2><p class="calendar-note">행사 참여 학생이 있으면 해당 날짜에 활동이 표시됩니다.</p></div><div><button class="chip" id="prevMonth">‹</button><button class="chip" id="todayMonth">오늘</button><button class="chip" id="nextMonth">›</button></div></div><div class="calendar" id="calendar"></div></div></div></section>

<input id="fileInput" type="file" accept=".xlsx,.xls,.csv" hidden><script>
let students=[],activities=[],selectedClass='',participantClass='',participantIds=new Set(),rangeCursor=new Date(),sortKey='number',sortAsc=true,viewDate=new Date(),showPast=false,showStatus=false,editingStudent='',editingActivity='',knownClasses=[],disciplineClass='';const $=id=>document.getElementById(id),admin=()=>sessionStorage.getItem('isAdmin')==='true';
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const dateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const activeStudents=()=>students.filter(s=>s.status!=='전출');const classes=()=>[...new Set(activeStudents().map(s=>`${s.grade}-${s.classNo}`))].sort((a,b)=>a.localeCompare(b,'ko',{numeric:true}));
async function api(method='GET',body){const r=await fetch('/api/students',{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});const data=await r.json();if(!r.ok)throw Error(data.error||'요청에 실패했습니다.');return data}async function load(){try{const [data,dashboard]=await Promise.all([api(),fetch('/api/dashboard').then(async r=>{const json=await r.json();if(!r.ok)throw Error(json.error||'일정 정보를 불러오지 못했습니다.');return json})]);students=data.students||[];activities=(dashboard.posts||[]).filter(p=>Array.isArray(p.participants)&&p.participants.length).map(p=>({id:p.id,teacher:p.author||'',title:p.title||'',description:p.content||'',startDate:p.start||p.deadline||'',endDate:p.end||p.deadline||'',participants:p.participants})).filter(a=>a.startDate&&a.endDate);if(!participantClass)participantClass=classes()[0]||'';render()}catch(e){document.querySelectorAll('.panel').forEach(p=>p.innerHTML='<div class="empty">정보를 불러오지 못했습니다.</div>');console.warn(e)}}
function render(){renderClasses();renderRoster();renderCalendar();renderActivities();renderDisciplinePicker();$('rosterAdmin').classList.toggle('hidden',!admin())}function renderClasses(){const list=classes(),grades=[...new Set(list.map(c=>c.split('-')[0]))],current=selectedClass;$('classPicker').innerHTML=`<select class="class-select" id="classSelect"><option value="" ${!current?'selected':''} disabled>학급 선택</option><option value="all" ${current==='all'?'selected':''}>전체 학생</option>${grades.map(g=>`<optgroup label="${g}학년">${list.filter(c=>c.startsWith(g+'-')).map(c=>`<option value="${c}" ${c===current?'selected':''}>${c.replace('-','학년 ')}반</option>`).join('')}</optgroup>`).join('')}</select>`;$('classSelect').onchange=e=>{selectedClass=e.target.value;render()}}function classStudents(){return selectedClass==='all'?activeStudents():selectedClass?activeStudents().filter(s=>`${s.grade}-${s.classNo}`===selectedClass):[]}
